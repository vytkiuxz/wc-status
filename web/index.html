<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC Status</title>
<link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚻</text></svg>">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1a1f27">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC">
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --text: #1a1d21;
    --muted: #7a828c;
    --free: #22c55e;
    --free-soft: rgba(34, 197, 94, .12);
    --busy: #ef4444;
    --busy-soft: rgba(239, 68, 68, .12);
    --wait: #f59e0b;
    --wait-soft: rgba(245, 158, 11, .12);
    --shadow: 0 10px 40px rgba(0, 0, 0, .08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101318;
      --card: #1a1f27;
      --text: #eef1f5;
      --muted: #8b95a1;
      --shadow: 0 10px 40px rgba(0, 0, 0, .45);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: grid;
    place-items: center;
    transition: background .8s ease;
    overflow: auto;
    padding: 24px;
  }
  body.free    { background: color-mix(in srgb, var(--free) 14%, var(--bg)); }
  body.busy    { background: color-mix(in srgb, var(--busy) 14%, var(--bg)); }

  .app-shell {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 0;
    width: min(92vw, 420px);
    transition:
      width .78s cubic-bezier(.22, 1, .36, 1),
      gap .78s cubic-bezier(.22, 1, .36, 1);
  }
  .app-shell.nerd-open {
    gap: 18px;
    width: min(96vw, 1281px);
  }

  .card {
    background: var(--card);
    border-radius: 28px;
    box-shadow: var(--shadow);
    padding: 48px 56px;
    text-align: center;
    width: 100%;
    min-width: 0;
    flex: 0 0 420px;
    position: relative;
  }

  .title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .light {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    margin: 0 auto 28px;
    display: grid;
    place-items: center;
    font-size: 72px;
    background: var(--wait-soft);
    transition: background .5s ease, box-shadow .5s ease, transform .16s ease;
    user-select: none;
    position: relative;
    overflow: hidden;
    border: 0;
    color: inherit;
    font-family: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .light:active { transform: scale(.955); }
  .light:focus-visible {
    outline: 3px solid color-mix(in srgb, var(--muted) 35%, transparent);
    outline-offset: 5px;
  }
  #lightEmoji {
    position: relative;
    z-index: 1;
    display: block;
    pointer-events: none;
  }
  .light-tap #lightEmoji {
    animation: light-pop .42s cubic-bezier(.2, .9, .25, 1);
  }
  @keyframes light-pop {
    0% { transform: scale(1); }
    28% { transform: scale(.84); }
    62% { transform: scale(1.09); }
    100% { transform: scale(1); }
  }
  .light-ripple {
    position: absolute;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    background: color-mix(in srgb, var(--text) 30%, transparent);
    box-shadow: 0 0 0 1px color-mix(in srgb, var(--text) 8%, transparent);
    transform: translate(-50%, -50%) scale(0);
    animation: light-ripple .72s cubic-bezier(.2, .7, .2, 1) forwards;
  }
  @keyframes light-ripple {
    65% { opacity: .55; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(9); }
  }
  .free .light {
    background: var(--free-soft);
    box-shadow: 0 0 0 0 rgba(34, 197, 94, .5);
    animation: pulse-free 2.5s ease-out infinite;
  }
  .busy .light {
    background: var(--busy-soft);
    box-shadow: 0 0 0 0 rgba(239, 68, 68, .5);
    animation: pulse-busy 1.6s ease-out infinite;
  }
  @keyframes pulse-free {
    0%   { box-shadow: 0 0 0 0 rgba(34, 197, 94, .45); }
    70%  { box-shadow: 0 0 0 26px rgba(34, 197, 94, 0); }
    100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
  }
  @keyframes pulse-busy {
    0%   { box-shadow: 0 0 0 0 rgba(239, 68, 68, .45); }
    70%  { box-shadow: 0 0 0 18px rgba(239, 68, 68, 0); }
    100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
  }

  .status {
    font-size: 42px;
    font-weight: 800;
    margin-bottom: 8px;
    transition: color .4s ease;
  }
  .free .status { color: var(--free); }
  .busy .status { color: var(--busy); }
  .wait .status { color: var(--wait); }

  .detail {
    font-size: 16px;
    color: var(--muted);
    min-height: 22px;
    font-variant-numeric: tabular-nums;
  }

  .foot {
    margin-top: 30px;
    font-size: 12px;
    color: var(--muted);
    opacity: .75;
    font-variant-numeric: tabular-nums;
  }
  .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 6px;
    vertical-align: 1px;
  }
  .dot.ok { background: var(--free); }

  .notify {
    margin-top: 18px;
    padding: 10px 18px;
    border: none;
    border-radius: 999px;
    font: 600 14px "Segoe UI", system-ui, sans-serif;
    color: var(--text);
    background: var(--busy-soft);
    cursor: pointer;
    transition: transform .15s ease, opacity .3s ease;
  }
  .notify:hover:not(:disabled) { transform: scale(1.04); }
  .notify:disabled { cursor: default; opacity: .7; }
  .notify[hidden] { display: none; }

  .journal {
    margin-top: 24px;
    text-align: left;
    font-size: 13px;
    color: var(--muted);
  }
  .jtitle {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    text-align: center;
    opacity: .8;
    margin-bottom: 6px;
  }
  .jrow {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 5px 2px;
    border-top: 1px solid color-mix(in srgb, var(--muted) 18%, transparent);
    font-variant-numeric: tabular-nums;
  }
  .jstats {
    margin-top: 10px;
    text-align: center;
    font-size: 12px;
    opacity: .85;
    font-variant-numeric: tabular-nums;
  }
  .jt2 { margin-top: 18px; }

  .nerd-drawer {
    width: 0;
    min-width: 0;
    max-height: 0;
    flex: 0 1 0;
    overflow: hidden;
    border-radius: 28px;
    background: var(--card);
    box-shadow: var(--shadow);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transform: translateX(-18px);
    transform-origin: left center;
    transition:
      width .72s cubic-bezier(.22, 1, .36, 1),
      opacity .36s ease,
      transform .72s cubic-bezier(.22, 1, .36, 1),
      flex-basis .72s cubic-bezier(.22, 1, .36, 1),
      max-height .78s cubic-bezier(.22, 1, .36, 1),
      visibility 0s linear .72s;
  }
  .nerd-open .nerd-drawer {
    width: 843px;
    max-height: 1200px;
    flex-basis: 843px;
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transform: translateX(0);
    transition-delay: 0s;
  }
  .nerd-panel {
    height: 100%;
    display: flex;
    flex-direction: column;
    background: transparent;
    border-radius: inherit;
    padding: 30px;
    opacity: 0;
    clip-path: inset(0 100% 0 0 round 28px);
    transform: translateX(-34px);
    transition:
      clip-path .72s cubic-bezier(.22, 1, .36, 1),
      transform .72s cubic-bezier(.22, 1, .36, 1),
      opacity .32s ease .08s;
    will-change: clip-path, transform, opacity;
  }
  .nerd-open .nerd-panel {
    opacity: 1;
    clip-path: inset(0 0 0 0 round 28px);
    transform: translateX(0);
  }
  .nerd-range {
    display: block;
    margin-bottom: 10px;
    text-align: left;
    font-size: 11px;
    color: var(--muted);
    opacity: .7;
  }
  .heatmap-wrap {
    position: relative;
    width: 100%;
    min-height: 0;
    flex: 1 1 auto;
    overflow: hidden;
  }
  .heatmap {
    position: absolute;
    inset: 0;
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }
  .heatmap-crosshair {
    position: absolute;
    display: none;
    pointer-events: none;
    z-index: 1;
    background: color-mix(in srgb, var(--text) 34%, transparent);
  }
  .heatmap-crosshair.is-visible { display: block; }
  .heatmap-crosshair-x { width: 1px; }
  .heatmap-crosshair-y { height: 1px; }
  .heatmap-tooltip {
    position: absolute;
    z-index: 2;
    width: max-content;
    min-width: 174px;
    max-width: min(240px, calc(100% - 16px));
    padding: 10px 12px;
    border: 1px solid color-mix(in srgb, var(--muted) 22%, transparent);
    border-radius: 12px;
    background: color-mix(in srgb, var(--card) 92%, transparent);
    box-shadow: 0 8px 24px rgba(0, 0, 0, .14);
    color: var(--text);
    opacity: 0;
    pointer-events: none;
    transition: opacity .12s ease;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .heatmap-tooltip.is-visible { opacity: 1; }
  .heatmap-tooltip-date {
    color: var(--muted);
    font-size: 10px;
    line-height: 1.3;
  }
  .heatmap-tooltip-time {
    margin-top: 2px;
    font-size: 15px;
    font-weight: 650;
    font-variant-numeric: tabular-nums;
  }
  .heatmap-tooltip-status {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 11px;
    font-weight: 600;
  }
  .heatmap-tooltip-dot {
    width: 6px;
    height: 6px;
    flex: 0 0 auto;
    border-radius: 50%;
    background: var(--free);
  }
  .heatmap-tooltip[data-occupied="true"] .heatmap-tooltip-dot { background: #ff5b5b; }
  .heatmap-tooltip-meta {
    margin-top: 4px;
    color: var(--muted);
    font-size: 10px;
    font-variant-numeric: tabular-nums;
  }
  .heatmap-legend {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
    color: var(--muted);
    font-size: 10px;
    opacity: .75;
  }
  .heatmap-swatch {
    width: 22px;
    height: 5px;
    border-radius: 999px;
    background: var(--busy);
  }

  @media (max-width: 1100px) {
    body { padding: 14px; }
    .app-shell,
    .app-shell.nerd-open {
      flex-direction: column;
      width: min(94vw, 480px);
    }
    .app-shell.nerd-open { gap: 14px; }
    .nerd-drawer { transform: translateY(-18px); }
    .nerd-open .nerd-drawer {
      width: 100%;
      flex-basis: auto;
      transform: translateY(0);
    }
    .nerd-panel {
      clip-path: inset(100% 0 0 0 round 28px);
      transform: translateY(-24px);
    }
    .nerd-open .nerd-panel {
      clip-path: inset(0 0 0 0 round 28px);
      transform: translateY(0);
    }
    .card { flex-basis: auto; padding: 42px 30px; }
    .nerd-panel { padding: 24px 18px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .app-shell, .nerd-drawer, .nerd-panel { transition-duration: .2s; }
    .light { transition: none; }
    .light-ripple { animation-duration: .01ms; }
    .light-tap #lightEmoji { animation-duration: .01ms; }
  }

  /* Emoji confetti when it becomes free */
  .confetti {
    position: fixed;
    top: -40px;
    font-size: 26px;
    pointer-events: none;
    animation: fall linear forwards;
    z-index: 10;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: .9; }
  }
</style>
</head>
<body class="wait">
  <div class="app-shell" id="appShell">
    <main class="card">
      <div class="title">WC Status</div>
      <button class="light" id="light" type="button" aria-expanded="false" aria-controls="nerdPanel" aria-label="Show 30-day occupancy heatmap">
        <span id="lightEmoji" aria-hidden="true">⏳</span>
      </button>
      <div class="status" id="status">Checking…</div>
      <div class="detail" id="detail">contacting the sensor</div>
      <div class="foot"><span class="dot" id="dot"></span><span id="foot">connecting…</span></div>
      <button class="notify" id="notifyBtn" hidden>🔔 Notify me when it's free</button>
      <div class="journal" id="journal"></div>
    </main>
    <aside class="nerd-drawer" id="nerdPanel" aria-hidden="true">
      <section class="nerd-panel" aria-label="30-day occupancy heatmap">
        <span class="nerd-range">Last 30 days</span>
        <div class="heatmap-wrap" id="heatmapWrap">
          <canvas class="heatmap" id="heatmap" role="img" aria-label="WC occupancy heatmap for the last 30 days, from midnight to midnight"></canvas>
          <span class="heatmap-crosshair heatmap-crosshair-x" id="heatmapCrosshairX" aria-hidden="true"></span>
          <span class="heatmap-crosshair heatmap-crosshair-y" id="heatmapCrosshairY" aria-hidden="true"></span>
          <div class="heatmap-tooltip" id="heatmapTooltip" role="tooltip" aria-hidden="true">
            <div class="heatmap-tooltip-date" id="heatmapTooltipDate"></div>
            <div class="heatmap-tooltip-time" id="heatmapTooltipTime"></div>
            <div class="heatmap-tooltip-status"><span class="heatmap-tooltip-dot"></span><span id="heatmapTooltipStatus"></span></div>
            <div class="heatmap-tooltip-meta" id="heatmapTooltipMeta"></div>
          </div>
        </div>
        <div class="heatmap-legend"><span class="heatmap-swatch"></span><span>occupied</span></div>
      </section>
    </aside>
  </div>

<script>
  // Served by the nginx container -> poll the backend (api/state), which
  // tracks exact transition times shared by all viewers. Opened straight
  // from disk -> poll the sensor directly (put its real IP here).
  const DIRECT = location.protocol === "file:";
  const DEVICE_URL = "http://192.168.1.60/status"; // DIRECT mode only
  const POLL_MS = 3000;      // how often to ask the sensor
  const TIMEOUT_MS = 2800;   // direct: <50 ms when powered; via proxy: 502/504 within ~2 s
  const MISSES_FOR_FREE = 3; // debounce: a couple of dropped packets shouldn't flip the status

  const $ = (id) => document.getElementById(id);
  const FACE_FREE = ["🎉", "🟢", "🙌", "🚪", "✨"];

  let state = "wait";        // wait | free | busy
  let misses = 0;
  let sinceMs = null;        // client-side timestamp of the last state change
  let deviceUptimeMs = null; // from the sensor: how long the light has been on
  let lastPollAt = null;
  let journalVisits = [];
  let heatmapLayout = null;
  let heatmapHoveredVisit = null;

  // Red/green tab icon by state. (The installed app's taskbar icon and badge
  // can't be recolored — the Badging API only supports a number/dot rendered
  // in the OS's own style — so this is for browser tabs.)
  const FAVICON_COLORS = { busy: "#ef4444", free: "#22c55e", wait: "#f59e0b" };
  function setFavicon(color) {
    $("favicon").href = "data:image/svg+xml," + encodeURIComponent(
      `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>` +
      `<circle cx='50' cy='50' r='46' fill='${color}'/>` +
      `<text x='50' y='66' font-size='44' text-anchor='middle' fill='white' font-family='Segoe UI,sans-serif' font-weight='bold'>WC</text></svg>`
    );
  }

  function fmtDuration(ms) {
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + "s";
    const m = Math.floor(s / 60);
    if (m < 60) return m + "m " + (s % 60) + "s";
    return Math.floor(m / 60) + "h " + (m % 60) + "m";
  }

  // ---- PWA: service worker (needs https or localhost; skipped on file://) ----
  let swReg = null;
  if ("serviceWorker" in navigator && location.protocol !== "file:") {
    navigator.serviceWorker.register("sw.js").then((r) => { swReg = r; }).catch(() => {});
  }

  // ---- App icon badge (installed PWA: Windows/macOS taskbar, iOS 16.4+ home
  // screen). Shows a dot/1 while occupied, clears when free. ----
  function updateBadge() {
    if (!("setAppBadge" in navigator)) return;
    if (state === "busy") navigator.setAppBadge(1).catch(() => {});
    else navigator.clearAppBadge().catch(() => {});
  }

  // ---- "Notify me when it's free" (also the Android badge alternative:
  // the notification gives the app icon its dot) ----
  // Preferred path: a real Web Push subscription via the server, which fires
  // even after this page/app is closed. Fallback: a local notification that
  // only works while the page stays open.
  let notifyArmed = false;
  let pushArmed = false;
  const notifyBtn = $("notifyBtn");
  const appShell = $("appShell");
  const lightBtn = $("light");
  const statusCard = document.querySelector(".card");
  const nerdPanel = $("nerdPanel");

  function syncNerdPanelHeight() {
    nerdPanel.style.height = statusCard.getBoundingClientRect().height + "px";
  }

  function toggleNerdPanel(event) {
    const rect = lightBtn.getBoundingClientRect();
    lightBtn.classList.remove("light-tap");
    void lightBtn.offsetWidth;
    lightBtn.classList.add("light-tap");
    setTimeout(() => lightBtn.classList.remove("light-tap"), 450);

    const ripple = document.createElement("span");
    ripple.className = "light-ripple";
    ripple.style.left = (event.clientX ? event.clientX - rect.left : rect.width / 2) + "px";
    ripple.style.top = (event.clientY ? event.clientY - rect.top : rect.height / 2) + "px";
    lightBtn.appendChild(ripple);
    ripple.addEventListener("animationend", () => ripple.remove(), { once: true });

    const open = appShell.classList.toggle("nerd-open");
    lightBtn.setAttribute("aria-expanded", String(open));
    lightBtn.setAttribute("aria-label", (open ? "Hide" : "Show") + " 30-day occupancy heatmap");
    nerdPanel.setAttribute("aria-hidden", String(!open));
    if (open) {
      syncNerdPanelHeight();
      requestAnimationFrame(drawHeatmap);
      setTimeout(drawHeatmap, 820);
    } else {
      hideHeatmapHover();
    }
  }

  lightBtn.addEventListener("click", toggleNerdPanel);

  function canNotify() {
    return "Notification" in window && Notification.permission !== "denied";
  }

  function renderNotifyBtn() {
    notifyBtn.hidden = !(canNotify() && state === "busy");
    notifyBtn.textContent = !notifyArmed ? "🔔 Notify me when it's free"
      : pushArmed ? "🔔 You'll get a ping — even if you close this"
      : "🔔 You'll get a ping while this stays open";
    notifyBtn.disabled = notifyArmed;
  }

  function urlB64ToUint8Array(b64) {
    const pad = "=".repeat((4 - (b64.length % 4)) % 4);
    const raw = atob((b64 + pad).replace(/-/g, "+").replace(/_/g, "/"));
    return Uint8Array.from(raw, (ch) => ch.charCodeAt(0));
  }

  async function subscribePush() {
    try {
      if (!swReg || !("PushManager" in window)) return false;
      const keyRes = await fetch("api/push/key");
      if (!keyRes.ok) return false; // push service absent or keys not configured
      const { key } = await keyRes.json();
      const sub = await swReg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToUint8Array(key),
      });
      const res = await fetch("api/push/subscribe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(sub),
      });
      return res.ok;
    } catch (e) {
      return false;
    }
  }

  notifyBtn.addEventListener("click", async () => {
    const perm = await Notification.requestPermission();
    if (perm !== "granted") { renderNotifyBtn(); return; }
    notifyArmed = true;
    pushArmed = await subscribePush();
    updateBadge(); // iOS: granting notifications is what unlocks the badge
    renderNotifyBtn();
  });

  async function sendFreeNotification() {
    const opts = { body: "Go go go 🏃", icon: "icons/icon-192.png", tag: "wc-free", renotify: true };
    try {
      if (swReg) await swReg.showNotification("🟢 WC is free!", opts);
      else new Notification("🟢 WC is free!", opts);
    } catch (e) { /* notifications unavailable — no harm done */ }
  }

  function setState(next) {
    if (next === state) return;
    if (state === "busy" && next === "free") {
      celebrate();
      // pushArmed: the server sends the push (same "wc-free" tag, so even a
      // race shows a single notification) — only the local fallback fires here.
      if (notifyArmed && !pushArmed) sendFreeNotification();
      notifyArmed = false;
      pushArmed = false;
    }
    state = next;
    sinceMs = Date.now();
    document.body.className = next;
    updateBadge();
    if (!DIRECT) setTimeout(loadJournal, 2000); // pick up the new journal entry
  }

  function render() {
    const now = Date.now();
    if (state === "busy") {
      $("lightEmoji").textContent = "🚽";
      $("status").textContent = "Occupied";
      const held = deviceUptimeMs != null
        ? deviceUptimeMs + (lastPollAt ? now - lastPollAt : 0)
        : (sinceMs ? now - sinceMs : 0);
      $("detail").textContent = "for " + fmtDuration(held) + " — hold on 😅";
      document.title = "🔴 Occupied — WC";
    } else if (state === "free") {
      $("lightEmoji").textContent = "🚪";
      $("status").textContent = "Free!";
      $("detail").textContent = sinceMs ? "free for " + fmtDuration(now - sinceMs) + " — go go go 🏃" : "go go go 🏃";
      document.title = "🟢 Free — WC";
    } else {
      $("lightEmoji").textContent = "⏳";
      $("status").textContent = "Checking…";
      $("detail").textContent = "contacting the sensor";
      document.title = "WC Status";
    }
    setFavicon(FAVICON_COLORS[state] || FAVICON_COLORS.wait);
    renderNotifyBtn();
  }

  function celebrate() {
    for (let i = 0; i < 24; i++) {
      const bit = document.createElement("span");
      bit.className = "confetti";
      bit.textContent = FACE_FREE[i % FACE_FREE.length];
      bit.style.left = Math.random() * 100 + "vw";
      bit.style.animationDuration = 1.6 + Math.random() * 1.8 + "s";
      bit.style.animationDelay = Math.random() * .4 + "s";
      document.body.appendChild(bit);
      setTimeout(() => bit.remove(), 4500);
    }
  }

  const poll = () => (DIRECT ? pollDirect() : pollState());

  // Backend mode: the push service is the source of truth. `since` is the
  // real transition moment (light on/off), identical for every viewer no
  // matter when they opened the page.
  async function pollState() {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
    try {
      const res = await fetch("api/state", { signal: ctrl.signal, cache: "no-store" });
      if (!res.ok) throw new Error("backend " + res.status);
      const d = await res.json();
      misses = 0;
      if (d.occupied !== null) {
        setState(d.occupied ? "busy" : "free");
        if (d.since) sinceMs = d.since + (Date.now() - d.now); // server clock -> local
      }
      $("dot").className = "dot ok";
      $("foot").textContent = d.occupied
        ? "sensor online · signal " + d.rssi + " dBm"
        : "sensor off (light is out)";
    } catch (e) {
      if (++misses >= MISSES_FOR_FREE) {
        $("dot").className = "dot";
        $("foot").textContent = "backend unreachable";
      }
    } finally {
      clearTimeout(timer);
    }
    render();
  }

  // Direct mode (page opened from disk): talk to the sensor itself.
  async function pollDirect() {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
    try {
      const res = await fetch(DEVICE_URL, { signal: ctrl.signal, cache: "no-store" });
      if (!res.ok) throw new Error("sensor unreachable (" + res.status + ")");
      const data = await res.json();
      misses = 0;
      deviceUptimeMs = data.uptime_ms;
      lastPollAt = Date.now();
      setState("busy");
      $("dot").className = "dot ok";
      $("foot").textContent = "sensor online · signal " + data.rssi + " dBm";
    } catch (e) {
      // No answer: the light (and therefore the sensor) is off.
      misses++;
      if (misses >= MISSES_FOR_FREE || state === "wait") {
        deviceUptimeMs = null;
        setState("free");
      }
      $("dot").className = "dot";
      $("foot").textContent = "sensor off (light is out)";
    } finally {
      clearTimeout(timer);
    }
    render();
  }

  // ---- visits journal (backend mode only) ----
  function fmtClock(ts) {
    const d = new Date(ts), now = new Date();
    const t = d.toLocaleTimeString("lt-LT", { hour: "2-digit", minute: "2-digit" });
    return d.toDateString() === now.toDateString()
      ? t
      : d.toLocaleDateString("lt-LT", { month: "numeric", day: "numeric" }) + " " + t;
  }

  async function loadJournal() {
    if (DIRECT) return;
    try {
      const res = await fetch("api/journal", { cache: "no-store" });
      if (!res.ok) return;
      const d = await res.json();
      renderJournal(d.events || [], d.now);
    } catch (e) { /* journal is decorative — never break the page over it */ }
  }

  function renderJournal(events, serverNow) {
    const off = Date.now() - (serverNow || Date.now());
    const visits = [];
    for (let i = 0; i < events.length; i++) {
      if (events[i].event !== "occupied") continue;
      const next = events[i + 1];
      visits.push({
        start: events[i].ts + off,
        end: next && next.event === "free" ? next.ts + off : null,
      });
    }
    const rows = visits.slice(-6).reverse();
    journalVisits = visits;
    drawHeatmap();

    // Fun stat of the day: fastest and longest completed visit.
    const today = new Date().toDateString();
    const doneToday = visits.filter((v) => v.end && new Date(v.start).toDateString() === today);
    let stats = "";
    if (doneToday.length >= 2) {
      const durs = doneToday.map((v) => v.end - v.start);
      stats = `<div class='jstats'>today · ⚡ fastest ${fmtDuration(Math.min(...durs))} · 🐢 longest ${fmtDuration(Math.max(...durs))}</div>`;
    }

    // Total time in use per work day (Mon-Fri), last 5 days with data.
    // Ongoing visit counts up to "now"; a visit is attributed to its start day.
    const byDay = new Map();
    for (const v of visits) {
      const d = new Date(v.start);
      const dow = d.getDay();
      if (dow === 0 || dow === 6) continue; // skip weekends
      const key = d.toDateString();
      const agg = byDay.get(key) || { ts: v.start, total: 0, count: 0 };
      agg.total += (v.end || Date.now()) - v.start;
      agg.count++;
      byDay.set(key, agg);
    }
    const days = [...byDay.values()].sort((a, b) => b.ts - a.ts).slice(0, 5);
    const daily = !days.length ? "" :
      "<div class='jtitle jt2'>In use per day</div>" + days.map((agg) => {
        const d = new Date(agg.ts);
        const label = d.toDateString() === today ? "today" :
          d.toLocaleDateString("lt-LT", { weekday: "short", month: "numeric", day: "numeric" });
        return `<div class='jrow'><span>${label}</span><span>${fmtDuration(agg.total)} · ${agg.count}×</span></div>`;
      }).join("");

    $("journal").innerHTML = !rows.length ? "" :
      "<div class='jtitle'>Recent visits</div>" + rows.map((v) =>
        `<div class='jrow'><span>🚽 ${fmtClock(v.start)}</span><span>${
          v.end ? fmtClock(v.end) + " · " + fmtDuration(v.end - v.start) : "ongoing…"
        }</span></div>`).join("") + stats + daily;
  }

  function heatmapClock(value) {
    return new Date(value).toLocaleTimeString("en-GB", {
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: false,
    });
  }

  function hideHeatmapHover() {
    $("heatmapCrosshairX").classList.remove("is-visible");
    $("heatmapCrosshairY").classList.remove("is-visible");
    const tooltip = $("heatmapTooltip");
    tooltip.classList.remove("is-visible");
    tooltip.setAttribute("aria-hidden", "true");
    if (heatmapHoveredVisit) {
      heatmapHoveredVisit = null;
      drawHeatmap();
    }
  }

  function moveHeatmapHover(event) {
    if (!heatmapLayout) return;

    const canvas = $("heatmap");
    const rect = canvas.getBoundingClientRect();
    const x = event.clientX - rect.left;
    const y = event.clientY - rect.top;
    const { left, top, plotWidth, plotHeight, columnWidth, days } = heatmapLayout;
    if (x < left || x > left + plotWidth || y < top || y > top + plotHeight) {
      hideHeatmapHover();
      return;
    }

    const column = Math.min(days.length - 1, Math.floor((x - left) / columnWidth));
    const day = days[column];
    const dayProgress = Math.min(1, Math.max(0, (top + plotHeight - y) / plotHeight));
    const timestamp = Math.min(day.end - 1, day.start + (dayProgress * (day.end - day.start)));
    const now = Date.now();
    const visit = journalVisits.find((item) =>
      item.start <= timestamp && Math.min(item.end || now, now) >= timestamp
    ) || null;

    const crosshairX = $("heatmapCrosshairX");
    const crosshairY = $("heatmapCrosshairY");
    crosshairX.style.left = x + "px";
    crosshairX.style.top = top + "px";
    crosshairX.style.height = plotHeight + "px";
    crosshairY.style.left = left + "px";
    crosshairY.style.top = y + "px";
    crosshairY.style.width = plotWidth + "px";
    crosshairX.classList.add("is-visible");
    crosshairY.classList.add("is-visible");

    $("heatmapTooltipDate").textContent = new Date(timestamp).toLocaleDateString("en-GB", {
      weekday: "long",
      day: "numeric",
      month: "long",
      year: "numeric",
    });
    $("heatmapTooltipTime").textContent = heatmapClock(timestamp);

    const tooltip = $("heatmapTooltip");
    tooltip.dataset.occupied = String(Boolean(visit));
    if (visit) {
      const end = Math.min(visit.end || now, now);
      $("heatmapTooltipStatus").textContent = "Occupied · " + fmtDuration(end - visit.start);
      $("heatmapTooltipMeta").textContent = visit.end
        ? heatmapClock(visit.start) + " – " + heatmapClock(visit.end)
        : "Since " + heatmapClock(visit.start);
    } else {
      $("heatmapTooltipStatus").textContent = "Available";
      $("heatmapTooltipMeta").textContent = "No occupancy at this time";
    }

    tooltip.classList.add("is-visible");
    tooltip.setAttribute("aria-hidden", "false");
    const tooltipWidth = tooltip.offsetWidth;
    const tooltipHeight = tooltip.offsetHeight;
    let tooltipLeft = x + 14;
    if (tooltipLeft + tooltipWidth > heatmapLayout.width - 8) {
      tooltipLeft = x - tooltipWidth - 14;
    }
    tooltip.style.left = Math.max(8, Math.min(tooltipLeft, heatmapLayout.width - tooltipWidth - 8)) + "px";
    tooltip.style.top = Math.max(8, Math.min(y - (tooltipHeight / 2), heatmapLayout.height - tooltipHeight - 8)) + "px";

    if (visit !== heatmapHoveredVisit) {
      heatmapHoveredVisit = visit;
      drawHeatmap();
    }
  }

  function drawHeatmap() {
    if (!appShell.classList.contains("nerd-open")) return;
    const canvas = $("heatmap");
    const width = Math.floor(canvas.getBoundingClientRect().width);
    const height = Math.floor(canvas.getBoundingClientRect().height);
    if (!width || !height) return;

    const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(width * pixelRatio);
    canvas.height = Math.round(height * pixelRatio);
    const ctx = canvas.getContext("2d");
    ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
    ctx.clearRect(0, 0, width, height);

    const left = 28;
    const right = 4;
    const top = 8;
    const bottom = 28;
    const columnCount = 30;
    const plotWidth = width - left - right;
    const plotHeight = height - top - bottom;
    const columnWidth = plotWidth / columnCount;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const days = Array.from({ length: columnCount }, (_, index) => {
      const day = new Date(today);
      day.setDate(today.getDate() - (columnCount - 1 - index));
      const nextDay = new Date(day);
      nextDay.setDate(day.getDate() + 1);
      return { date: day, start: day.getTime(), end: nextDay.getTime() };
    });
    const muted = getComputedStyle(document.documentElement).getPropertyValue("--muted").trim();
    heatmapLayout = { width, height, left, top, plotWidth, plotHeight, columnWidth, days };

    ctx.strokeStyle = "rgba(122, 130, 140, .1)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let column = 0; column <= columnCount; column++) {
      const x = left + (column * columnWidth);
      ctx.moveTo(x, top);
      ctx.lineTo(x, top + plotHeight);
    }
    for (const hour of [0, 6, 12, 18, 24]) {
      const y = top + plotHeight - ((hour / 24) * plotHeight);
      ctx.moveTo(left, y);
      ctx.lineTo(left + plotWidth, y);
    }
    ctx.stroke();

    function drawVisit(visit, fillStyle) {
      const visitEnd = Math.min(visit.end || Date.now(), Date.now());
      ctx.fillStyle = fillStyle;
      for (let column = 0; column < days.length; column++) {
        const day = days[column];
        const intervalStart = Math.max(visit.start, day.start);
        const intervalEnd = Math.min(visitEnd, day.end);
        if (intervalEnd <= intervalStart) continue;

        const dayDuration = day.end - day.start;
        const intervalHeight = ((intervalEnd - intervalStart) / dayDuration) * plotHeight;
        const y = top + plotHeight - (((intervalEnd - day.start) / dayDuration) * plotHeight);
        ctx.fillRect(
          left + (column * columnWidth) + 1,
          y,
          Math.max(1, columnWidth - 2),
          intervalHeight
        );
      }
    }

    for (const visit of journalVisits) {
      drawVisit(visit, "rgba(239, 68, 68, .72)");
    }
    if (heatmapHoveredVisit) {
      drawVisit(heatmapHoveredVisit, "#ff5b5b");
    }

    ctx.fillStyle = muted;
    ctx.font = "10px Segoe UI, system-ui, sans-serif";
    ctx.textBaseline = "middle";
    ctx.textAlign = "left";
    ctx.fillText("00", 2, top + 3);
    ctx.fillText("18", 2, top + (plotHeight * .25));
    ctx.fillText("12", 2, top + (plotHeight * .5));
    ctx.fillText("06", 2, top + (plotHeight * .75));
    ctx.fillText("00", 2, top + plotHeight - 2);

    ctx.textBaseline = "bottom";
    for (const column of [0, 7, 14, 21, 29]) {
      const isFirst = column === 0;
      const isLast = column === columnCount - 1;
      ctx.textAlign = isFirst ? "left" : isLast ? "right" : "center";
      const x = isFirst
        ? left
        : isLast
          ? width - right
          : left + ((column + .5) * columnWidth);
      ctx.fillText(
        days[column].date.toLocaleDateString("en-GB", { day: "numeric", month: "short" }),
        x,
        height - 2
      );
    }
  }

  $("heatmap").addEventListener("pointermove", moveHeatmapHover);
  $("heatmap").addEventListener("pointerleave", hideHeatmapHover);

  if ("ResizeObserver" in window) {
    new ResizeObserver(drawHeatmap).observe($("heatmap"));
    new ResizeObserver(() => {
      if (appShell.classList.contains("nerd-open")) syncNerdPanelHeight();
    }).observe(statusCard);
  }

  poll();
  setInterval(poll, POLL_MS);
  setInterval(render, 1000); // keep the duration counters ticking between polls
  loadJournal();
  setInterval(loadJournal, 30000);
</script>
</body>
</html>
