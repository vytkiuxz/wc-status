<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC Status</title>
<link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚻</text></svg>">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1a1f27">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC">
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --text: #1a1d21;
    --muted: #7a828c;
    --free: #22c55e;
    --free-soft: rgba(34, 197, 94, .12);
    --busy: #ef4444;
    --busy-soft: rgba(239, 68, 68, .12);
    --wait: #f59e0b;
    --wait-soft: rgba(245, 158, 11, .12);
    --shadow: 0 10px 40px rgba(0, 0, 0, .08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101318;
      --card: #1a1f27;
      --text: #eef1f5;
      --muted: #8b95a1;
      --shadow: 0 10px 40px rgba(0, 0, 0, .45);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: grid;
    place-items: center;
    transition: background .8s ease;
    overflow: hidden;
  }
  body.free    { background: color-mix(in srgb, var(--free) 14%, var(--bg)); }
  body.busy    { background: color-mix(in srgb, var(--busy) 14%, var(--bg)); }

  .card {
    background: var(--card);
    border-radius: 28px;
    box-shadow: var(--shadow);
    padding: 48px 56px;
    text-align: center;
    width: min(92vw, 420px);
    position: relative;
  }

  .title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .light {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    margin: 0 auto 28px;
    display: grid;
    place-items: center;
    font-size: 72px;
    background: var(--wait-soft);
    transition: background .5s ease, box-shadow .5s ease;
    user-select: none;
  }
  .free .light {
    background: var(--free-soft);
    box-shadow: 0 0 0 0 rgba(34, 197, 94, .5);
    animation: pulse-free 2.5s ease-out infinite;
  }
  .busy .light {
    background: var(--busy-soft);
    box-shadow: 0 0 0 0 rgba(239, 68, 68, .5);
    animation: pulse-busy 1.6s ease-out infinite;
  }
  @keyframes pulse-free {
    0%   { box-shadow: 0 0 0 0 rgba(34, 197, 94, .45); }
    70%  { box-shadow: 0 0 0 26px rgba(34, 197, 94, 0); }
    100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
  }
  @keyframes pulse-busy {
    0%   { box-shadow: 0 0 0 0 rgba(239, 68, 68, .45); }
    70%  { box-shadow: 0 0 0 18px rgba(239, 68, 68, 0); }
    100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
  }

  .status {
    font-size: 42px;
    font-weight: 800;
    margin-bottom: 8px;
    transition: color .4s ease;
  }
  .free .status { color: var(--free); }
  .busy .status { color: var(--busy); }
  .wait .status { color: var(--wait); }

  .detail {
    font-size: 16px;
    color: var(--muted);
    min-height: 22px;
    font-variant-numeric: tabular-nums;
  }

  .foot {
    margin-top: 30px;
    font-size: 12px;
    color: var(--muted);
    opacity: .75;
    font-variant-numeric: tabular-nums;
  }
  .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 6px;
    vertical-align: 1px;
  }
  .dot.ok { background: var(--free); }

  .notify {
    margin-top: 18px;
    padding: 10px 18px;
    border: none;
    border-radius: 999px;
    font: 600 14px "Segoe UI", system-ui, sans-serif;
    color: var(--text);
    background: var(--busy-soft);
    cursor: pointer;
    transition: transform .15s ease, opacity .3s ease;
  }
  .notify:hover:not(:disabled) { transform: scale(1.04); }
  .notify:disabled { cursor: default; opacity: .7; }
  .notify[hidden] { display: none; }

  /* Emoji confetti when it becomes free */
  .confetti {
    position: fixed;
    top: -40px;
    font-size: 26px;
    pointer-events: none;
    animation: fall linear forwards;
    z-index: 10;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: .9; }
  }
</style>
</head>
<body class="wait">
  <main class="card">
    <div class="title">WC Status</div>
    <div class="light" id="light">⏳</div>
    <div class="status" id="status">Checking…</div>
    <div class="detail" id="detail">contacting the sensor</div>
    <div class="foot"><span class="dot" id="dot"></span><span id="foot">connecting…</span></div>
    <button class="notify" id="notifyBtn" hidden>🔔 Notify me when it's free</button>
  </main>

<script>
  // Served by the nginx container -> same-origin proxy (works over https).
  // Opened straight from disk -> talk to the sensor directly (put your
  // sensor's real IP here for that to work).
  const DEVICE_URL = location.protocol === "file:"
    ? "http://192.168.1.60/status"
    : "/api/status";
  const POLL_MS = 3000;      // how often to ask the sensor
  const TIMEOUT_MS = 2800;   // direct: <50 ms when powered; via proxy: 502/504 within ~2 s
  const MISSES_FOR_FREE = 2; // debounce: one dropped packet shouldn't flip the status

  const $ = (id) => document.getElementById(id);
  const FACE_FREE = ["🎉", "🟢", "🙌", "🚪", "✨"];

  let state = "wait";        // wait | free | busy
  let misses = 0;
  let sinceMs = null;        // client-side timestamp of the last state change
  let deviceUptimeMs = null; // from the sensor: how long the light has been on
  let lastPollAt = null;

  function fmtDuration(ms) {
    const s = Math.floor(ms / 1000);
    if (s < 60) return s + "s";
    const m = Math.floor(s / 60);
    if (m < 60) return m + "m " + (s % 60) + "s";
    return Math.floor(m / 60) + "h " + (m % 60) + "m";
  }

  // ---- PWA: service worker (needs https or localhost; skipped on file://) ----
  let swReg = null;
  if ("serviceWorker" in navigator && location.protocol !== "file:") {
    navigator.serviceWorker.register("sw.js").then((r) => { swReg = r; }).catch(() => {});
  }

  // ---- App icon badge (installed PWA: Windows/macOS taskbar, iOS 16.4+ home
  // screen). Shows a dot/1 while occupied, clears when free. ----
  function updateBadge() {
    if (!("setAppBadge" in navigator)) return;
    if (state === "busy") navigator.setAppBadge(1).catch(() => {});
    else navigator.clearAppBadge().catch(() => {});
  }

  // ---- "Notify me when it's free" (also the Android badge alternative:
  // the notification gives the app icon its dot) ----
  // Preferred path: a real Web Push subscription via the server, which fires
  // even after this page/app is closed. Fallback: a local notification that
  // only works while the page stays open.
  let notifyArmed = false;
  let pushArmed = false;
  const notifyBtn = $("notifyBtn");

  function canNotify() {
    return "Notification" in window && Notification.permission !== "denied";
  }

  function renderNotifyBtn() {
    notifyBtn.hidden = !(canNotify() && state === "busy");
    notifyBtn.textContent = !notifyArmed ? "🔔 Notify me when it's free"
      : pushArmed ? "🔔 You'll get a ping — even if you close this"
      : "🔔 You'll get a ping while this stays open";
    notifyBtn.disabled = notifyArmed;
  }

  function urlB64ToUint8Array(b64) {
    const pad = "=".repeat((4 - (b64.length % 4)) % 4);
    const raw = atob((b64 + pad).replace(/-/g, "+").replace(/_/g, "/"));
    return Uint8Array.from(raw, (ch) => ch.charCodeAt(0));
  }

  async function subscribePush() {
    try {
      if (!swReg || !("PushManager" in window)) return false;
      const keyRes = await fetch("api/push/key");
      if (!keyRes.ok) return false; // push service absent or keys not configured
      const { key } = await keyRes.json();
      const sub = await swReg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToUint8Array(key),
      });
      const res = await fetch("api/push/subscribe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(sub),
      });
      return res.ok;
    } catch (e) {
      return false;
    }
  }

  notifyBtn.addEventListener("click", async () => {
    const perm = await Notification.requestPermission();
    if (perm !== "granted") { renderNotifyBtn(); return; }
    notifyArmed = true;
    pushArmed = await subscribePush();
    updateBadge(); // iOS: granting notifications is what unlocks the badge
    renderNotifyBtn();
  });

  async function sendFreeNotification() {
    const opts = { body: "Go go go 🏃", icon: "icons/icon-192.png", tag: "wc-free" };
    try {
      if (swReg) await swReg.showNotification("🟢 WC is free!", opts);
      else new Notification("🟢 WC is free!", opts);
    } catch (e) { /* notifications unavailable — no harm done */ }
  }

  function setState(next) {
    if (next === state) return;
    if (state === "busy" && next === "free") {
      celebrate();
      // pushArmed: the server sends the push (same "wc-free" tag, so even a
      // race shows a single notification) — only the local fallback fires here.
      if (notifyArmed && !pushArmed) sendFreeNotification();
      notifyArmed = false;
      pushArmed = false;
    }
    state = next;
    sinceMs = Date.now();
    document.body.className = next;
    updateBadge();
  }

  function render() {
    const now = Date.now();
    if (state === "busy") {
      $("light").textContent = "🚽";
      $("status").textContent = "Occupied";
      const held = deviceUptimeMs != null
        ? deviceUptimeMs + (lastPollAt ? now - lastPollAt : 0)
        : (sinceMs ? now - sinceMs : 0);
      $("detail").textContent = "for " + fmtDuration(held) + " — hold on 😅";
      document.title = "🔴 Occupied — WC";
    } else if (state === "free") {
      $("light").textContent = "🚪";
      $("status").textContent = "Free!";
      $("detail").textContent = sinceMs ? "free for " + fmtDuration(now - sinceMs) + " — go go go 🏃" : "go go go 🏃";
      document.title = "🟢 Free — WC";
    } else {
      $("light").textContent = "⏳";
      $("status").textContent = "Checking…";
      $("detail").textContent = "contacting the sensor";
      document.title = "WC Status";
    }
    renderNotifyBtn();
  }

  function celebrate() {
    for (let i = 0; i < 24; i++) {
      const bit = document.createElement("span");
      bit.className = "confetti";
      bit.textContent = FACE_FREE[i % FACE_FREE.length];
      bit.style.left = Math.random() * 100 + "vw";
      bit.style.animationDuration = 1.6 + Math.random() * 1.8 + "s";
      bit.style.animationDelay = Math.random() * .4 + "s";
      document.body.appendChild(bit);
      setTimeout(() => bit.remove(), 4500);
    }
  }

  async function poll() {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
    try {
      const res = await fetch(DEVICE_URL, { signal: ctrl.signal, cache: "no-store" });
      if (!res.ok) throw new Error("sensor unreachable (" + res.status + ")"); // proxy 502/504 = light off
      const data = await res.json();
      misses = 0;
      deviceUptimeMs = data.uptime_ms;
      lastPollAt = Date.now();
      setState("busy");
      $("dot").className = "dot ok";
      $("foot").textContent = "sensor online · signal " + data.rssi + " dBm";
    } catch (e) {
      // No answer: the light (and therefore the sensor) is off.
      misses++;
      if (misses >= MISSES_FOR_FREE || state === "wait") {
        deviceUptimeMs = null;
        setState("free");
      }
      $("dot").className = "dot";
      $("foot").textContent = "sensor off (light is out)";
    } finally {
      clearTimeout(timer);
    }
    render();
  }

  poll();
  setInterval(poll, POLL_MS);
  setInterval(render, 1000); // keep the duration counters ticking between polls
</script>
</body>
</html>
