services:
  wc-status-web:
    build: ./web
    image: wc-status-web:latest
    ports:
      - "8080:80"
    environment:
      # Sensor address; nginx proxies /api/status to it server-side so the
      # page works from any origin, including https. Set the real value via
      # a WC_DEVICE environment variable (e.g. in Portainer's stack env vars
      # or a local .env file) instead of committing it here.
      WC_DEVICE: "${WC_DEVICE:-192.168.1.60}"
      # In-container DNS used to re-resolve the push service on each request.
      # 127.0.0.11 is Docker's embedded DNS — override only on Podman etc.
      DNS_RESOLVER: "${DNS_RESOLVER:-127.0.0.11}"
    restart: unless-stopped
    depends_on:
      - wc-status-push
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    # NOTE: joining the default "bridge" network is not possible from a
    # compose stack (Docker: "network-scoped alias is supported only for
    # containers in user defined networks"). To let a reverse proxy container
    # reach this service, either target http://<docker-host>:8080, or share a
    # user-defined network with the proxy and target http://wc-status-web:80
    # by uncommenting below (set "proxy" to the network your proxy stack uses):
    #
    #    networks: [default, proxy]
    #
    # networks:
    #   proxy:
    #     external: true

  # Watches the sensor 24/7 and sends the one-shot "WC is free" Web Push to
  # subscribers even when nobody has the page open. Generate VAPID keys once
  # (e.g. `npx web-push generate-vapid-keys`) and provide them via env vars.
  wc-status-push:
    build: ./push
    image: wc-status-push:latest
    container_name: wc-status-push
    restart: unless-stopped
    environment:
      WC_DEVICE: "${WC_DEVICE:-192.168.1.60}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:admin@example.com}"
    volumes:
      - push-data:/data

volumes:
  push-data:
