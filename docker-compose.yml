services:
  wc-status-web:
    build: ./web
    image: wc-status-web:latest
    environment:
      # Sensor address; nginx proxies /api/status to it server-side so the
      # page works from any origin, including https. Set the real value via
      # a WC_DEVICE environment variable (e.g. in Portainer's stack env vars
      # or a local .env file) instead of committing it here.
      WC_DEVICE: "${WC_DEVICE:-192.168.1.60}"
    restart: unless-stopped
    depends_on:
      - wc-status-push
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    # "default" (the stack's own network) must stay: nginx resolves the push
    # service by name there — the default bridge has no DNS. "bridge" makes
    # the container reachable by its 172.17.x.x IP from other bridge
    # containers/the host.
    networks:
      - default
      - bridge

  # Watches the sensor 24/7 and sends the one-shot "WC is free" Web Push to
  # subscribers even when nobody has the page open. Generate VAPID keys once
  # (e.g. `npx web-push generate-vapid-keys`) and provide them via env vars.
  wc-status-push:
    build: ./push
    image: wc-status-push:latest
    restart: unless-stopped
    environment:
      WC_DEVICE: "${WC_DEVICE:-192.168.1.60}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:admin@example.com}"
    volumes:
      - push-data:/data
    networks:
      - default
      - bridge

networks:
  # The Docker host's pre-existing default bridge network.
  bridge:
    external: true

volumes:
  push-data:
