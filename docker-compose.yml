services:
  wc-status-web:
    build: ./web
    image: wc-status-web:latest
    container_name: wc-status-web
    ports:
      - "8080:80"
    environment:
      # Sensor address; nginx proxies /api/status to it server-side so the
      # page works from any origin, including https.
      WC_DEVICE: "10.65.35.60"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
