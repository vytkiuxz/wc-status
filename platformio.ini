; PlatformIO config — `pio run -t upload` flashes the board.
; Change `board` to match yours: nodemcuv2 (NodeMCU), d1_mini (Wemos D1 mini),
; esp12e (generic ESP-12), etc.

[platformio]
src_dir = wc_status

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
